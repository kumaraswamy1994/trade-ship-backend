version: '3.9'
services:
  postgres-database:
    image: postgres:15
    container_name: postgres-database
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tradeship
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-database

  admin:
    build: ./admin
    container_name: admin
    ports:
      - "8001:8000"
    depends_on:
      - postgres-database

  trade:
    build: ./trade
    container_name: trade
    ports:
      - "8002:8000"
    depends_on:
      - postgres-database

  transport:
    build: ./transport
    container_name: transport
    ports:
      - "8003:8000"
    depends_on:
      - postgres-database

  auto-assignment:
    build: ./auto-assignment
    container_name: auto-assignment
    ports:
      - "8004:8000"
    depends_on:
      - postgres-database

volumes:
  postgres_data:
