services:
  
  postgres-database:
    image: postgres:15
    container_name: postgres-database
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tradeship
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-database
    networks:
      - backend

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: admin
    ports:
      - "8001:8000"
    depends_on:
      - postgres-database
    networks:
      - backend

  trade:
    build:
      context: .
      dockerfile: trade/Dockerfile
    container_name: trade
    ports:
      - "8002:8000"
    depends_on:
      - postgres-database
    networks:
      - backend

  transport:
    build:
      context: .
      dockerfile: transport/Dockerfile
    container_name: transport
    ports:
      - "8003:8000"
    depends_on:
      - postgres-database
    networks:
      - backend

  auto-assignment:
    build:
      context: .
      dockerfile: auto-assignment/Dockerfile
    container_name: auto-assignment
    ports:
      - "8004:8000"
    depends_on:
      - postgres-database
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
